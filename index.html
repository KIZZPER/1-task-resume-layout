<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/personalInfo.css">
    <link rel="stylesheet" href="styles/avatar.css">

</head>
<body>
    <main class="page">
        <div class="resume">
            <section class="block-1">
                <article class="avatar-container card">
                    <img src="assets/images/profileImg.png" alt="Profile picture" class="avatar">
                </article>
                <article class="personal-info card">
                    <p class="personal-info_header-text">Hello 👋🏻 I’m</p>
                    <div class="personal-info_container">
                        <p class="personal-info_name">Karthik SR</p>
                        <p class="personal-info_speciality">UX/UI Designer</p>
                    </div>
                </article>
                <article class="languages-info card">
                    <h3 class="header-text">Languages</h3>
                    <div class="languages-info_container">
                        <div class="languages-info_item">
                            <p>English</p>
                            <div class="languages-info_progress"></div>
                        </div>
                        <div class="languages-info_item">
                            <p>Malayalam</p>
                            <div class="languages-info_progress"></div>
                        </div>
                        <div class="languages-info_item">
                            <p>Hindi</p>
                            <div class="languages-info_progress"></div>
                        </div>
                    </div>
                </article>
            </section>
        </div>
    </main>
</body>
</html>
